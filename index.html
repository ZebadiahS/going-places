<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Animations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <canvas id="canvas1"></canvas>
    <img class="background" id="playerImage" src="./Enchantress/walking_directions.png">
    <img class="background" id="backgroundImage" src="./backgroundLayers/Page 1.webp">
    <img class="background" id="backgroundImage2" src="./backgroundLayers/Page 2.webp">
    <img class="background" id="backgroundImage3" src="./backgroundLayers/Page 3.webp">
    <img class="background" id="backgroundImage4" src="./backgroundLayers/Page 4.webp">

    <img id="curtain-down" src="./backgroundLayers/curtain.webp" alt="">
    <img id="top-curtain" src="./backgroundLayers/top-curtain.webp" alt="">

    <button id="startButton">Lets Go Places!</button>
    <button id="resetButton">Return to Start</button>

    <ul id="instructions">
        <li>
            <h2>Move Forward</h2>
            <img src="./Enchantress/forward.png" alt="">
        </li>
        <li>
            <h2>Jump</h2>
            <img src="./Enchantress/jump.png" alt="">
        </li>
        <li>
            <h2>Move Backward</h2>
            <img src="./Enchantress/backward.png" alt="">
        </li>
    </ul>

    <script src="https://code.jquery.com/jquery-3.4.0.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js" defer></script>
    <script src="machine.js" defer></script>
    <script src="game.js" defer></script>
</body>
</html>
